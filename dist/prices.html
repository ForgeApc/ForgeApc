const CL = {cpu:'CPU',gpu:'GPU',mobo:'Mobo',ram:'RAM',storage:'SSD',psu:'PSU',case:'Case',cooler:'Cooler'};
const ORDER = ['cpu','gpu','mobo','ram','storage','psu','case','cooler'];
const fmt = n => (n==null||isNaN(n)) ? '' : '$'+Number(n).toFixed(2);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let LAST = null;

function srcStatus(dbg){
  if(!dbg || !dbg.configured) return {cls:'off', txt:'Not configured'};
  if(dbg.httpStatus && dbg.httpStatus!==200) return {cls:'err', txt:'Error '+dbg.httpStatus};
  if((dbg.itemsRead||0)===0) return {cls:'warn', txt:'Empty dataset'};
  if((dbg.matched||0)===0) return {cls:'warn', txt:'0 matched'};
  return {cls:'ok', txt:'Working'};
}
function badge(s){return '<span class="stbadge '+s.cls+'"><span class="d"></span>'+s.txt+'</span>';}
function card(icCls,label,letter,st,rows){
  let h='<div class="card"><div class="hd"><div class="ic '+icCls+'">'+letter+'</div><span class="nm">'+label+'</span>'+badge(st)+'</div>';
  for(const [k,v] of rows) h+='<div class="kv"><span>'+k+'</span><b class="mono">'+v+'</b></div>';
  return h+'</div>';
}

function render(data){
  LAST = data;
  const prices = data.prices||{}, dbg = data._debug||{}, env = (dbg.env||{});
  const ad = dbg.amazon||{}, nd = dbg.newegg||{};
  let aN=0,nN=0,bN=0;
  for(const id in prices){const e=prices[id]; if(e.amazon!=null)aN++; if(e.newegg!=null)nN++; if(e.bestbuy!=null)bN++;}
  const liveN = Object.keys(prices).length;

  // banner
  const working = [srcStatus(ad).cls, srcStatus(nd).cls].filter(c=>c==='ok').length + (bN>0?1:0);
  const beacon = working>0 ? (working>=2?'live':'live') : 'err';
  const bcls = liveN>0 ? (working>0?'live':'warn') : 'err';
  document.getElementById('beacon').className = 'beacon '+bcls;
  document.getElementById('btitle').textContent = liveN>0 ? 'Live prices active' : 'No live prices';
  const when = data.updatedAt ? new Date(data.updatedAt).toLocaleString() : '—';
  document.getElementById('bsub').textContent = liveN+' parts priced · '+working+' source(s) working · checked '+when;

  // source cards
  const aSt=srcStatus(ad), nSt=srcStatus(nd);
  const bbSt = !env.bestBuyKeySet ? {cls:'off',txt:'Not configured'} : (bN>0?{cls:'ok',txt:'Working'}:{cls:'warn',txt:'0 matched'});
  let cards='';
  cards += card('amazon','Amazon','A',aSt,[['Items read',(ad.itemsRead??'—')],['Matched parts',aN],['HTTP',(ad.httpStatus??'—')],['Actor',ad.actorId?esc(ad.actorId):(env.amazonActorSet?'set':'—')],['Token',env.amazonTokenSet?'set':'missing']]);
  cards += card('newegg','Newegg','N',nSt,[['Items read',(nd.itemsRead??'—')],['Matched parts',nN],['HTTP',(nd.httpStatus??'—')],['Actor',nd.actorId?esc(nd.actorId):(env.neweggActorSet?'set':'—')],['Token',env.neweggTokenSet?'set':'missing']]);
  cards += card('bb','Best Buy','B',bbSt,[['Matched parts',bN],['API key',env.bestBuyKeySet?'set':'optional — not set']]);
  document.getElementById('cards').innerHTML = cards;

  // summary
  document.getElementById('sums').innerHTML =
    sum(liveN,'Parts priced')+sum(aN,'via Amazon')+sum(nN,'via Newegg')+sum(bN,'via Best Buy');

  buildTable(prices, data.media||{});
  filt(document.getElementById('q').value);
}
function sum(v,k){return '<div class="sum"><div class="v">'+v+'</div><div class="k">'+k+'</div></div>';}

function buildTable(prices, media){
  const rows = Object.keys(prices).map(id=>{
    const e=prices[id]; const vals=[['amazon',e.amazon],['newegg',e.newegg],['bestbuy',e.bestbuy]].filter(x=>x[1]!=null);
    let win=null,lo=Infinity; for(const [s,v] of vals){if(v<lo){lo=v;win=s;}}
    return {id,cat:CATS[id]||'',name:NAMES[id]||id,a:e.amazon,n:e.newegg,b:e.bestbuy,win,lo,media:media[id]||{}};
  });
  rows.sort((x,y)=> ORDER.indexOf(x.cat)-ORDER.indexOf(y.cat) || x.name.localeCompare(y.name));
  const cell=(v,s,win)=> v==null?'<td class="cell-na">·</td>':'<td class="'+(s===win?'lo':'')+'">'+fmt(v)+'</td>';
  let body='';
  for(const r of rows){
    const m = (r.win==='newegg'? r.media.newegg : r.media.amazon) || r.media.amazon || r.media.newegg || {};
    const nm = m.url ? '<a href="'+esc(m.url)+'" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">'+esc(r.name)+'</a>' : esc(r.name);
    const win = r.win?'<span class="winchip '+r.win+'">'+(r.win==='bestbuy'?'BB':r.win[0].toUpperCase()+r.win.slice(1))+'</span>':'';
    body+='<tr data-n="'+esc(r.name.toLowerCase())+'"><td><span class="tag">'+(CL[r.cat]||r.cat)+'</span>'+nm+'</td>'
      +cell(r.a,'amazon',r.win)+cell(r.n,'newegg',r.win)+cell(r.b,'bestbuy',r.win)+'<td>'+win+'</td></tr>';
  }
  document.getElementById('tbody').innerHTML = body || '';
  document.getElementById('emptymsg').style.display = rows.length? 'none':'block';
}
function filt(q){q=(q||'').toLowerCase();let shown=0;
  document.querySelectorAll('#tbody tr').forEach(r=>{const m=r.getAttribute('data-n').includes(q);r.style.display=m?'':'none';if(m)shown++;});
}
function setError(){document.getElementById('beacon').className='beacon err';
  document.getElementById('btitle').textContent='Could not reach /api/prices';
  document.getElementById('bsub').textContent='The price endpoint did not respond. Check the deployment.';}
async function load(){
  document.getElementById('beacon').className='beacon warn';
  document.getElementById('btitle').textContent='Checking…';
  document.getElementById('bsub').textContent='Reading /api/prices';
  try{const r=await fetch('/api/prices?debug=1&t='+Date.now(),{cache:'no-store'});render(await r.json());}
  catch(e){setError();}
}
document.getElementById('refresh').addEventListener('click',load);
document.getElementById('q').addEventListener('input',e=>filt(e.target.value));
load();
setInterval(load, 60000);
</script></body></html>
